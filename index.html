<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Lamp Engine | ジーニー</title>
    
    <!-- PWA Metadata -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#7494c0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- External Assets -->
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('Genie is ready!', reg.scope);
                }).catch(err => {
                    console.log('Magic failed...', err);
                });
            });
        }
    </script>
</head>
<body>
    <div class="app-container">
        
        <!-- 1列目: 左端の細いナビゲーションバー -->
        <nav class="line-nav">
            <div class="nav-top">
                <div class="nav-icon active" title="ホーム"><i class="fas fa-home"></i></div>
                <div class="nav-icon" title="メッセージ"><i class="fas fa-comment-dots"></i><span class="badge">1</span></div>
                <div class="nav-icon" title="執筆記録"><i class="fas fa-feather-alt"></i></div>
                <div class="nav-icon" title="本棚"><i class="fas fa-book"></i></div>
                <div class="nav-icon" title="外部連携"><i class="fab fa-line"></i></div>
            </div>
            <div class="nav-bottom">
                <div class="nav-icon" id="themeToggleBtn" title="テーマ切替"><i class="fas fa-moon"></i></div>
                <div class="nav-icon" title="設定"><i class="fas fa-cog"></i></div>
            </div>
        </nav>

        <!-- 2列目: 中央のキャンバス（ワークスペース） -->
        <section class="line-middle" id="middleCanvas">
            <div class="middle-header">
                <h2>原稿キャンバス</h2>
                <div class="header-actions">
                    <i class="fas fa-sort-amount-down"></i>
                </div>
            </div>
            
            <div class="middle-content">
                <!-- Drop Zone -->
                <div class="knowledge-upload">
                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>参考資料を流し込む</p>
                    </div>
                </div>

                <!-- Plot List -->
                <div class="manuscript-card">
                    <h4>構成案（プロット）</h4>
                    <div id="plotList">
                        <!-- 以前のプロットがここに表示されます -->
                    </div>
                </div>

                <!-- Live Preview -->
                <div class="manuscript-card">
                    <h4>ライブ・プレビュー</h4>
                    <div id="previewArea" class="preview-text">
                        メッセージから魔法を紡ぎ出します...
                    </div>
                </div>

                <button class="crystallize-btn">
                    <i class="fas fa-gem"></i> 原稿を研ぎ出し・出力
                </button>
            </div>
        </section>

        <!-- 3列目: 右側のチャット画面 -->
        <main class="line-chat">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-avatar"><i class="fas fa-bolt"></i></div>
                    <div class="chat-title">
                        <h2>ジーニー</h2>
                        <div class="chat-subtitle">AI Writing Partner</div>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button class="header-icon" title="検索"><i class="fas fa-search"></i></button>
                    <button class="header-icon toggle-btn" id="toggleCanvasBtn" title="ワークスペース切替"><i class="fas fa-columns"></i></button>
                </div>
            </header>

            <div class="chat-messages" id="chatMessages">
                <!-- メッセージがここに表示されます -->
            </div>

            <div class="chat-input-area">
                <div class="input-toolbar">
                    <i class="fas fa-paperclip tool-icon"></i>
                    <i class="far fa-bookmark tool-icon"></i>
                    <i class="fas fa-crop-alt tool-icon"></i>
                </div>
                <div class="input-container">
                    <textarea id="userInput" placeholder="メッセージを入力" rows="1"></textarea>
                    <div class="input-actions" id="sendBtn">
                        <i class="fas fa-paper-plane tool-icon" style="color: var(--accent); cursor: pointer;"></i>
                    </div>
                </div>
            </div>
        </main>
        
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
